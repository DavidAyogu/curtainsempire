<!DOCTYPE html>
<html>
  <head>
    <title>Practical</title>
  </head>
  <style>
    *{
      padding: 0;
      margin: 0;
      font-family: Arial;
    }

    .header-container{
      padding: 10px;
      position: relative;
      display: flex;
      background-color: aqua;
    }

    .logo-box{
      display: flex;
      cursor: pointer;
    }

    .logo-box a{
      text-decoration: none;
      font-size: 25px;
      color: black;
      font-weight: 700;
      margin-left: 30px;
    }

    .header-box{
      position: relative;
      display: flex;
      left: 100vh;
      align-items: center;
    }

    .header-box p a{
      color: black;
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      padding: 23px;
    }

    .header-box a:hover{
      color: white;
      cursor: pointer;
      transition: 1s;
    }


  </style>
  <body>
    <div class="header-container">
      <div class="logo-box">
        <a href="">Logo</a>
      </div>

      <div class="header-box">
        <p><a href="">Home</a></p>
        <p><a href="">Service</a></p>
        <p><a href="">Contact</a></p>
        <p><a href="">About Us</a></p>
      </div>
    </div>
  </body>
</html>
